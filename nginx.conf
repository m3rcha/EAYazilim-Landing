server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # 1. Eksik Güvenlik Header'larını Ekleme
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.google-analytics.com; connect-src 'self' https://supabase.eayazilim.tr https://www.google-analytics.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 2. Dışarıya Açık Kritik Dosyaları Engelleme
    location ~* (/(package\.json|package-lock\.json|Dockerfile|nginx\.conf)|/\.vscode/.*) {
        deny all;
        return 404;
    }

    # 3. Hassas Dosyayı Kontrol Et: /env.js
    location = /env.js {
        add_header X-Robots-Tag "noindex, nofollow";
        
        # Referer kontrolü (Sadece eayazilim.tr uzantılı sitelerden çağrılmasına izin verir)
        valid_referers none blocked server_names ~\.eayazilim\.tr$;
        if ($invalid_referer) {
            return 403;
        }
    }

    # Normal HTML ve Asset Yönlendirmeleri
    location / {
        try_files $uri $uri/ /index.html;
    }
}
